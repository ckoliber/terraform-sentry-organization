name: CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs: {}

jobs:
  cicd:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
      attestations: write
      id-token: write
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: jdx/mise-action@v4
        with:
          version: 2026.5.7
      - uses: actions/cache@v4
        with:
          path: .terraform/
          key: ${{ hashFiles('.terraform.lock.hcl') }}

      - run: mise run init
      - run: mise run test
      - if: github.event_name == 'push'
        run: mise run release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
